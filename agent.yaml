# Foundry Hosted Agent definition for `azd ai agent deploy`.
# Schema: flat top-level keys (kind, name, protocols, resources,
# environment_variables). Do NOT nest these under a `definition:` block — that's
# the raw REST API schema and the azd tooling silently ignores it.

kind: hosted
name: internal-hr-helper

protocols:
  - protocol: responses
    version: 1.0.0

resources:
  cpu: '0.5'
  memory: 1.0Gi

dockerfile_path: Dockerfile

# Non-secret config injected into the container as env vars.
# Secrets should be added as a CustomKeys connection on the project and
# referenced with ${{connections.<name>.credentials.<field>}}.
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-4.1
  - name: AZURE_SEARCH_ENDPOINT
    value: https://{{service-name}}.search.windows.net/
  - name: AZURE_SEARCH_KB_NAME
    value: {{kb-name}}
  - name: CUSTOM_FOUNDRY_AGENT_TOOLBOX_NAME
    value: {{toolbox-name}}
